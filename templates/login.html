<!DOCTYPE html>
<html>

<head>

    <title>Login</title>
    <link rel="icon"
      type="image/png"
      href="{{ url_for('static',
      filename='images/favicon.png') }}">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">
</head>

<body>
<div class="brand">

    <img src="{{ url_for('static',
    filename='images/logo.png') }}">

    <div>

        <h1>Student Performance</h1>

        <h3>Prediction System</h3>

    </div>

</div>
<div class="auth-container">

    <div class="auth-card">

        <h2>Login</h2>

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <br><br>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="auth-link">

            Don't have an account?

            <a href="/signup">
                Sign Up
            </a>

        </div>

    </div>

</div>
<footer>

    © 2026 Student Performance Prediction System

    Version 1.0 | Developed by Nathaniel Ampadu

</footer>
</body>

</html>
