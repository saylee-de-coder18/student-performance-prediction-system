<!DOCTYPE html>
<html>

<head>

    <title>Forgot Password</title>

    <link rel="stylesheet"
          href="{{ url_for(
          'static',
          filename='css/style.css'
          ) }}">
<link rel="icon"
        type="image/png"
        href="{{ url_for('static',
        filename='images/favicon.png') }}">
</head>

<body>

<div class="auth-container">

    <h2>
        Forgot Password
    </h2>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required>

        <button type="submit">

            Send Reset Link

        </button>

    </form>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

</div>
<footer>

    © 2026 Student Performance Prediction System

    Version 1.0 | Developed by Nathaniel Ampadu

</footer>
</body>

</html>
